<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>수학공간 학생 수업 기록</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#fff;--bg2:#f5f4f2;--bg3:#edeae6;--t1:#111;--t2:#666;--t3:#999;--b1:rgba(0,0,0,.1);--b2:rgba(0,0,0,.22);--r:8px;--rl:12px;--warn-bg:#faeeda;--warn-t:#633806;--danger-bg:#fcebeb;--danger-t:#a32d2d;--info-bg:#e6f1fb;--info-t:#0c447c;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--t1:#f5f5f5;--t2:#ababab;--t3:#6e6e73;--b1:rgba(255,255,255,.1);--b2:rgba(255,255,255,.22);--warn-bg:#412402;--warn-t:#fac775;--danger-bg:#501313;--danger-t:#f09595;--info-bg:#042c53;--info-t:#85b7eb;}}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:var(--bg3);color:var(--t1);min-height:100vh;}
#token-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.tbox{background:var(--bg);border:0.5px solid var(--b1);border-radius:var(--rl);padding:28px 24px;width:100%;max-width:420px;}
.tbox h1{font-size:17px;font-weight:500;margin-bottom:6px;}
.tbox p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:20px;}
.tbox label{font-size:11px;font-weight:500;color:var(--t2);letter-spacing:.3px;display:block;margin-bottom:5px;}
.tbox input{width:100%;font-family:inherit;font-size:14px;padding:10px 12px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--bg2);color:var(--t1);outline:none;}
.tbox button{width:100%;margin-top:12px;padding:11px;font-size:14px;font-weight:500;font-family:inherit;border-radius:var(--r);border:none;background:var(--t1);color:var(--bg);cursor:pointer;}
.tbox button:hover{opacity:.8;}
.tnote{font-size:11px;color:var(--t3);margin-top:12px;line-height:1.7;}
.tnote a{color:var(--info-t);}
#app{display:none;}
.hdr{background:var(--bg);border-bottom:0.5px solid var(--b1);padding:14px 16px 12px;position:sticky;top:0;z-index:10;}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.hdr-title{font-size:15px;font-weight:500;flex:1;}
.reset-btn{background:none;border:0.5px solid var(--b1);border-radius:6px;padding:4px 9px;font-size:11px;color:var(--t2);cursor:pointer;font-family:inherit;}
.sw{position:relative;}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;}
.sw input{width:100%;font-family:inherit;font-size:14px;padding:9px 12px 9px 32px;border:0.5px solid var(--b1);border-radius:var(--r);background:var(--bg2);color:var(--t1);outline:none;}
.page{padding:12px 16px;}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.s-card{background:var(--bg);border:0.5px solid var(--b1);border-radius:var(--rl);padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s;}
.s-card:hover{border-color:var(--b2);}
.av{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;margin-bottom:8px;}
.s-nm{font-size:14px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s-sub{font-size:11px;color:var(--t2);}
.s-cls{font-size:10px;color:var(--t3);margin-top:2px;}
.cnt{font-size:12px;color:var(--t2);margin-bottom:10px;}
#profile{display:none;}
.phdr{background:var(--bg);border-bottom:0.5px solid var(--b1);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
.back{background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--t2);display:flex;align-items:center;gap:5px;padding:0;-webkit-tap-highlight-color:transparent;}
.pnm{font-size:16px;font-weight:500;flex:1;}
.pill{padding:2px 8px;border-radius:20px;font-size:11px;border:0.5px solid var(--b1);color:var(--t2);}
.psub{padding:6px 16px 5px;background:var(--bg);border-bottom:0.5px solid var(--b1);font-size:12px;color:var(--t2);}
.lcard{background:var(--bg);border:0.5px solid var(--b1);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px;}
.lcard.absent{border-left:2px solid var(--danger-t);border-radius:0 var(--rl) var(--rl) 0;}
.lcard.issue{border-left:2px solid #854F0B;border-radius:0 var(--rl) var(--rl) 0;}
.ltop{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.ldate{font-size:12px;font-weight:500;color:var(--t2);}
.badge{padding:2px 7px;border-radius:10px;font-size:11px;}
.badge.a{background:var(--danger-bg);color:var(--danger-t);}
.badge.i{background:var(--warn-bg);color:var(--warn-t);}
.badge.n{background:var(--info-bg);color:var(--info-t);}
.lsec{margin-bottom:6px;}
.lsec:last-child{margin-bottom:0;}
.llbl{font-size:11px;font-weight:500;color:var(--t2);letter-spacing:.3px;margin-bottom:2px;}
.ltxt{font-size:13px;line-height:1.65;}
.lhl{font-size:13px;line-height:1.65;padding:6px 10px;border-radius:6px;}
.lhl.warn{background:var(--warn-bg);color:var(--warn-t);}
.lhl.info{background:var(--info-bg);color:var(--info-t);}
.div{height:0.5px;background:var(--b1);margin:6px 0;}
.skel{background:var(--bg2);border-radius:6px;animation:sk 1.2s ease-in-out infinite;}
@keyframes sk{0%,100%{opacity:.4;}50%{opacity:.9;}}
.lbar{height:2px;background:var(--b1);border-radius:2px;overflow:hidden;margin:10px 0;}
.lbar-fill{height:100%;background:var(--t2);animation:lp 1.5s ease-in-out infinite;border-radius:2px;}
@keyframes lp{0%{width:0;margin-left:0;}50%{width:60%;margin-left:20%;}100%{width:0;margin-left:100%;}}
.ltxt2{font-size:13px;color:var(--t2);text-align:center;padding:18px 0;}
.err{padding:10px 12px;border-radius:var(--r);background:var(--danger-bg);color:var(--danger-t);font-size:13px;margin-bottom:10px;}
.empty{text-align:center;padding:32px 16px;font-size:13px;color:var(--t2);}
.dbg{padding:8px 12px;border-radius:var(--r);background:var(--bg2);font-size:11px;color:var(--t3);margin-bottom:8px;}
</style>
</head>
<body>
<div id="token-screen">
  <div class="tbox">
    <h1>수학공간 학생 수업 기록</h1>
    <p>에어테이블 Personal Access Token을 입력하면 학생별 3주치 수업 기록을 바로 볼 수 있습니다.</p>
    <label>AIRTABLE PERSONAL ACCESS TOKEN</label>
    <input type="password" id="pat" placeholder="patXXXXXXXXXXXXXX.XXXX..." autocomplete="off"/>
    <button onclick="startApp()">시작하기</button>
    <div class="tnote">
      토큰은 이 기기 브라우저에만 저장됩니다.<br>
      발급: <a href="https://airtable.com/create/tokens" target="_blank">airtable.com/create/tokens</a><br>
      필요 권한: data.records:read (마스터 데이터 베이스)
    </div>
  </div>
</div>
<div id="app">
  <div id="list-view">
    <div class="hdr">
      <div class="hdr-top">
        <div class="hdr-title">수학공간 학생 수업 기록</div>
        <button class="reset-btn" onclick="resetToken()">토큰 변경</button>
      </div>
      <div class="sw">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="color:var(--t3)">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search" placeholder="이름, 학교, 반 검색..." oninput="filterStudents(this.value)"/>
      </div>
    </div>
    <div class="page">
      <div id="list-err" class="err" style="display:none"></div>
      <div id="list-debug" class="dbg" style="display:none"></div>
      <div id="list-loading">
        <div class="lbar"><div class="lbar-fill"></div></div>
        <div class="ltxt2">에어테이블에서 학생 목록 불러오는 중...</div>
        <div class="grid" id="skel-grid"></div>
      </div>
      <div id="list-ready" style="display:none">
        <div class="cnt" id="cnt"></div>
        <div class="grid" id="s-grid"></div>
        <div id="no-res" class="empty" style="display:none">검색 결과가 없습니다</div>
      </div>
    </div>
  </div>
  <div id="profile">
    <div class="phdr">
      <button class="back" onclick="goBack()">
        <svg width="7" height="11" viewBox="0 0 7 11" fill="none">
          <path d="M6 1L1 5.5L6 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        목록
      </button>
      <div class="pnm" id="p-nm"></div>
      <span class="pill" id="p-info"></span>
    </div>
    <div class="psub" id="p-cls"></div>
    <div class="page">
      <div id="p-err" class="err" style="display:none"></div>
      <div id="p-loading">
        <div class="lbar"><div class="lbar-fill"></div></div>
        <div class="ltxt2">수업 기록 불러오는 중...</div>
        <div id="p-skel"></div>
      </div>
      <div id="p-content" style="display:none"></div>
    </div>
  </div>
</div>
<script>
// ── 에어테이블 설정 ────────────────────────────────────────
var BASE = 'appxMMBoetYF4u2eO';
// 테이블 ID
var TBL_STUDENTS = 'tblWxg7O3LENNoFhS';
var TBL_CLASSES  = 'tbl4H2KDmJP0gVniY';
var TBL_SCHOOLS  = 'tblkFOBQewc6GPtVm';
var TBL_LESSONS  = 'tblricZCtZsMdibXS';
// 필드 ID
var F_SNAME   = 'fld9th9v7T5NXykNa';
var F_SGRADE  = 'flddWDsSawpSRZsTv';
var F_SSCHOOL = 'fld38X6Mm0ao1PSYj';
var F_SCLASS  = 'fldRgJvxEkgxzLpk1';
var F_SSTATUS = 'fldpj2cjO6b8x4M26';
var F_CNAME   = 'fldJWIyfEAtE9lhYQ';
var F_SCNAME  = 'fldGePCJIigrBqJWM';
var F_LDATE   = 'fld19rmWbyJhwrI4b';
var F_LCLASS  = 'fld8DNfmCLhVVf278';
var F_LCONT   = 'fld4YlOAIY2jXqfcE';
var F_LHW     = 'fldirbUHowlbeyYDT';
var F_LNOTE   = 'fldDdQPzkWsftHJNh';
var F_LHWCHK  = 'fldYXLAIsdGaw9MzI';
var F_LABSENT = 'fld4ZDUO9nS8jY7R7';

var TOKEN = '';
var allStudents = [];
var filteredStudents = [];
var lessonCache = {};

// ── 앱 시작 ──────────────────────────────────────────────
function startApp() {
  var pat = document.getElementById('pat').value.trim();
  if (!pat) { alert('토큰을 입력해주세요'); return; }
  TOKEN = pat;
  try { localStorage.setItem('at_pat', btoa(unescape(encodeURIComponent(pat)))); } catch(e) {}
  document.getElementById('token-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  makeSkeleton();
  loadAll();
}
function resetToken() { localStorage.removeItem('at_pat'); location.reload(); }

// ── Airtable 호출 (fields 파라미터 없이 전체 조회) ──────────
function atFetch(tableId, filter, sortField) {
  var all = [];
  function doPage(offset) {
    var params = ['pageSize=100'];
    if (filter) params.push('filterByFormula=' + encodeURIComponent(filter));
    if (sortField) {
      params.push('sort%5B0%5D%5Bfield%5D=' + encodeURIComponent(sortField));
      params.push('sort%5B0%5D%5Bdirection%5D=desc');
    }
    if (offset) params.push('offset=' + encodeURIComponent(offset));
    var url = 'https://api.airtable.com/v0/' + BASE + '/' + tableId + '?' + params.join('&');
    return fetch(url, { headers: { 'Authorization': 'Bearer ' + TOKEN } })
      .then(function(r) {
        if (!r.ok) {
          return r.json().then(function(e) {
            throw new Error((e.error && e.error.message) || ('HTTP ' + r.status));
          });
        }
        return r.json();
      })
      .then(function(d) {
        all = all.concat(d.records || []);
        if (d.offset) return doPage(d.offset);
        return all;
      });
  }
  return doPage(null);
}

// ── 필드값 추출 헬퍼 ────────────────────────────────────────
// 필드 ID 또는 한국어 이름 둘 다 시도
function getField(fields, fieldId, altName) {
  var v = fields[fieldId];
  if (v !== undefined && v !== null) return v;
  if (altName) {
    v = fields[altName];
    if (v !== undefined && v !== null) return v;
  }
  return undefined;
}

function getStatusName(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (typeof v === 'object' && v.name) return v.name;
  return '';
}

// ── 수업내용에서 학생 이름 해당 줄만 추출 ────────────────────
function extract(text, name) {
  if (!text || !name) return '';
  var lines = text.split('\n');
  var out = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var ci = line.indexOf(':');
    if (ci < 0) continue;
    if (line.substring(0, ci).indexOf(name) >= 0) {
      var c = line.substring(ci + 1).trim();
      if (c) out.push(c);
    }
  }
  return out.join(' / ');
}

function fmtDate(s) {
  if (!s) return '';
  var parts = s.split('-');
  var days = ['일','월','화','수','목','금','토'];
  var dt = new Date(s + 'T12:00:00');
  return parts[0] + '.' + parseInt(parts[1]) + '.' + parseInt(parts[2]) + ' (' + days[dt.getDay()] + ')';
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── 스켈레톤 ────────────────────────────────────────────────
function makeSkeleton() {
  var sk = '<div style="background:var(--bg);border:0.5px solid var(--b1);border-radius:12px;padding:12px;">' +
    '<div class="skel" style="width:36px;height:36px;border-radius:50%;margin-bottom:8px;"></div>' +
    '<div class="skel" style="width:70%;height:13px;margin-bottom:6px;"></div>' +
    '<div class="skel" style="width:50%;height:11px;"></div></div>';
  document.getElementById('skel-grid').innerHTML = sk.repeat(6);
  var ps = '<div style="background:var(--bg);border:0.5px solid var(--b1);border-radius:12px;padding:12px 14px;margin-bottom:8px;">' +
    '<div class="skel" style="width:45%;height:12px;margin-bottom:10px;"></div>' +
    '<div class="skel" style="width:90%;height:12px;margin-bottom:6px;"></div>' +
    '<div class="skel" style="width:70%;height:12px;"></div></div>';
  document.getElementById('p-skel').innerHTML = ps.repeat(3);
}

// ── 초기 데이터 로드 ─────────────────────────────────────────
function loadAll() {
  Promise.all([
    atFetch(TBL_CLASSES),
    atFetch(TBL_SCHOOLS),
    atFetch(TBL_STUDENTS)
  ]).then(function(results) {
    var classRecs   = results[0];
    var schoolRecs  = results[1];
    var studentRecs = results[2];

    console.log('[디버그] 반:', classRecs.length, '학교:', schoolRecs.length, '학생(원본):', studentRecs.length);
    if (studentRecs.length > 0) {
      console.log('[디버그] 첫 번째 학생 field keys:', Object.keys(studentRecs[0].fields));
      console.log('[디버그] 첫 번째 학생 데이터:', JSON.stringify(studentRecs[0].fields).substring(0, 300));
    }

    // 반 ID → 이름 맵
    var classMap = {};
    classRecs.forEach(function(r) {
      var name = getField(r.fields, F_CNAME, '반 이름') || getField(r.fields, F_CNAME, 'Name') || '';
      classMap[r.id] = name;
    });

    // 학교 ID → 이름 맵
    var schoolMap = {};
    schoolRecs.forEach(function(r) {
      var name = getField(r.fields, F_SCNAME, 'Name') || getField(r.fields, F_SCNAME, '학교명') || '';
      schoolMap[r.id] = name;
    });

    allStudents = studentRecs.map(function(r) {
      var f = r.fields;
      // 이름: 필드ID 또는 '이름' 키로 시도
      var name = getField(f, F_SNAME, '이름') || '';
      var grade = getField(f, F_SGRADE, '학년') || '';
      var classArr = getField(f, F_SCLASS, '반') || [];
      var schoolArr = getField(f, F_SSCHOOL, '학교') || [];
      var statusVal = getField(f, F_SSTATUS, '퇴원여부');
      var statusName = getStatusName(statusVal);
      var classId = Array.isArray(classArr) ? (classArr[0] || '') : '';
      var schoolId = Array.isArray(schoolArr) ? (schoolArr[0] || '') : '';
      return {
        id: r.id,
        name: name,
        grade: grade,
        school: schoolMap[schoolId] || '',
        cls: classMap[classId] || '',
        classId: classId,
        isOut: statusName === '퇴원'
      };
    }).filter(function(s) { return s.name; })
      .sort(function(a, b) { return a.name.localeCompare(b.name, 'ko'); });

    var outCount = allStudents.filter(function(s) { return s.isOut; }).length;
    console.log('[디버그] 최종 학생:', allStudents.length, '퇴원:', outCount);

    var dbg = document.getElementById('list-debug');
    dbg.textContent = 'API 연결 성공 · 전체 ' + allStudents.length + '명 (퇴원 ' + outCount + '명 포함)';
    dbg.style.display = 'block';

    document.getElementById('list-loading').style.display = 'none';
    document.getElementById('list-ready').style.display = 'block';
    renderStudents(allStudents.filter(function(s) { return !s.isOut; }));
  }).catch(function(e) {
    console.error('[디버그] 오류:', e);
    document.getElementById('list-loading').style.display = 'none';
    showErr('list-err', '오류: ' + e.message);
  });
}

// ── 학생 목록 렌더링 ─────────────────────────────────────────
function renderStudents(list) {
  filteredStudents = list;
  document.getElementById('cnt').textContent = list.length + '명';
  var grid = document.getElementById('s-grid');
  var noRes = document.getElementById('no-res');
  if (!list.length) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';
  grid.innerHTML = list.map(function(s, i) {
    return '<div class="s-card" onclick="openStudent(' + i + ')">' +
      '<div class="av">' + esc(s.name.charAt(0)) + '</div>' +
      '<div class="s-nm">' + esc(s.name) + '</div>' +
      '<div class="s-sub">' + esc(s.school) + ' ' + esc(s.grade) + '</div>' +
      '<div class="s-cls">' + esc(s.cls) + '</div>' +
      '</div>';
  }).join('');
}

function filterStudents(q) {
  var base = allStudents.filter(function(s) { return !s.isOut; });
  var list = q ? base.filter(function(s) {
    return s.name.indexOf(q) >= 0 || s.school.indexOf(q) >= 0 || s.cls.indexOf(q) >= 0 || s.grade.indexOf(q) >= 0;
  }) : base;
  renderStudents(list);
}

// ── 학생 프로필 ──────────────────────────────────────────────
function openStudent(i) {
  var s = filteredStudents[i];
  if (!s) return;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('profile').style.display = 'block';
  document.getElementById('p-nm').textContent = s.name;
  document.getElementById('p-info').textContent = s.school + ' ' + s.grade;
  document.getElementById('p-cls').textContent = s.cls + ' · 최근 3주 수업';
  document.getElementById('p-err').style.display = 'none';
  document.getElementById('p-loading').style.display = 'block';
  document.getElementById('p-content').style.display = 'none';
  document.getElementById('p-content').innerHTML = '';
  window.scrollTo(0, 0);
  fetchLessons(s.classId, s.name).then(function(lessons) {
    renderLessons(lessons);
  }).catch(function(e) {
    document.getElementById('p-loading').style.display = 'none';
    showErr('p-err', '수업 기록 오류: ' + e.message);
  });
}

function matchesId(val, id) {
  // REST API returns strings, MCP returns objects - handle both
  if (!val) return false;
  if (typeof val === 'string') return val === id;
  if (typeof val === 'object') return val.id === id || val.name === id;
  return false;
}

function fetchLessons(classId, name) {
  var key = classId + '_' + name;
  if (lessonCache[key]) return Promise.resolve(lessonCache[key]);
  var filter = 'IS_AFTER({' + F_LDATE + "}, DATEADD(TODAY(), -21, 'days'))";
  return atFetch(TBL_LESSONS, filter, F_LDATE).then(function(recs) {
    console.log('[디버그] 3주 수업 기록 전체:', recs.length, '건');
    if (recs.length > 0) {
      var sample = recs[0].fields;
      var classVal = getField(sample, F_LCLASS, '반');
      console.log('[디버그] 첫 번째 레코드 반 필드:', JSON.stringify(classVal));
      console.log('[디버그] 찾으려는 classId:', classId);
    }

    var lessons = recs
      .filter(function(r) {
        var cls = getField(r.fields, F_LCLASS, '반') || [];
        // REST API: cls = ["recXXXX"], MCP: cls = [{id:"recXXXX", name:"..."}]
        return cls.some(function(c) { return matchesId(c, classId); });
      })
      .map(function(r) {
        var f = r.fields;
        var noteText  = getField(f, F_LNOTE,  '개별 코멘트(특이사항)') || '';
        var hwChkText = getField(f, F_LHWCHK, '과제점검') || '';
        var absentArr = getField(f, F_LABSENT, '결석자') || [];
        // 결석: 이름 포함된 텍스트나 linked record 모두 체크
        var absent = absentArr.some(function(x) {
          if (typeof x === 'string') return false; // record ID만 있을 때는 확인 불가
          return x && x.name === name;
        });
        return {
          date: getField(f, F_LDATE, '수업일시') || '',
          content: extract(getField(f, F_LCONT, '수업 내용') || '', name),
          homework: extract(getField(f, F_LHW, '과제') || '', name),
          note: noteText.indexOf(name) >= 0 ? noteText : '',
          homeworkCheck: hwChkText.indexOf(name) >= 0 ? hwChkText : '',
          absent: absent
        };
      })
      .filter(function(l) { return l.content || l.homework || l.note || l.homeworkCheck || l.absent; });

    console.log('[디버그] 해당 반 수업:', lessons.length, '건 (학생 내용 있는 것)');
    lessonCache[key] = lessons;
    return lessons;
  });
}

function renderLessons(lessons) {
  document.getElementById('p-loading').style.display = 'none';
  var el = document.getElementById('p-content');
  if (!lessons.length) {
    el.innerHTML = '<div class="empty">최근 3주 수업 기록이 없습니다</div>';
    el.style.display = 'block';
    return;
  }
  el.innerHTML = lessons.map(function(l) {
    var hasIssue = l.note || l.homeworkCheck;
    var cls = l.absent ? 'absent' : hasIssue ? 'issue' : '';
    var badges = '';
    if (l.absent) badges += '<span class="badge a">결석</span>';
    if (l.homeworkCheck) badges += '<span class="badge i">과제 미흡</span>';
    if (l.note && !l.homeworkCheck) badges += '<span class="badge n">특이사항</span>';
    var secs = '';
    if (l.content) secs += '<div class="lsec"><div class="llbl">수업 내용</div><div class="ltxt">' + esc(l.content) + '</div></div>';
    if (l.homework) secs += (l.content ? '<div class="div"></div>' : '') + '<div class="lsec"><div class="llbl">과제</div><div class="ltxt">' + esc(l.homework) + '</div></div>';
    if (l.homeworkCheck) secs += '<div class="div"></div><div class="lsec"><div class="llbl">과제 점검</div><div class="lhl warn">' + esc(l.homeworkCheck) + '</div></div>';
    if (l.note) secs += '<div class="div"></div><div class="lsec"><div class="llbl">특이사항</div><div class="lhl info">' + esc(l.note) + '</div></div>';
    return '<div class="lcard ' + cls + '"><div class="ltop"><span class="ldate">' + fmtDate(l.date) + '</span>' + badges + '</div>' + secs + '</div>';
  }).join('');
  el.style.display = 'block';
}

function goBack() {
  document.getElementById('profile').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  window.scrollTo(0, 0);
}
function showErr(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}

// ── 초기 로드 ────────────────────────────────────────────────
window.onload = function() {
  try {
    var saved = localStorage.getItem('at_pat');
    if (saved) {
      TOKEN = decodeURIComponent(escape(atob(saved)));
      document.getElementById('pat').value = TOKEN;
      startApp();
    }
  } catch(e) { localStorage.removeItem('at_pat'); }
  document.getElementById('pat').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') startApp();
  });
};
</script>
